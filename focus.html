<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Focus">
<meta name="theme-color" content="#0f1117">
<title>Focus</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0d0f14;
    --bg2: #13161e;
    --bg3: #1a1e28;
    --border: #252a38;
    --amber: #e8a045;
    --amber-dim: #a06820;
    --amber-glow: rgba(232,160,69,0.12);
    --text: #d4d8e8;
    --text-dim: #6b7292;
    --text-muted: #3d4260;
    --green: #4ade80;
    --red: #f87171;
    --blue: #60a5fa;
    --font-mono: 'DM Mono', monospace;
    --font-display: 'Playfair Display', serif;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    padding: calc(var(--safe-top) + 14px) 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    position: relative;
  }

  .header-title {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--amber);
    letter-spacing: -0.3px;
  }

  .header-date {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .icon-btn {
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 14px;
    transition: all 0.15s;
  }
  .icon-btn:active { transform: scale(0.93); background: var(--border); }

  /* ── Navigation ── */
  .nav {
    display: flex;
    border-top: 1px solid var(--border);
    background: var(--bg);
    padding-bottom: var(--safe-bottom);
    flex-shrink: 0;
  }

  .nav-btn {
    flex: 1;
    padding: 10px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    color: var(--text-muted);
    transition: color 0.15s;
    border: none;
    background: none;
    font-family: var(--font-mono);
  }

  .nav-btn.active { color: var(--amber); }
  .nav-btn:active { opacity: 0.7; }

  .nav-icon { font-size: 18px; }
  .nav-label { font-size: 9px; letter-spacing: 0.8px; text-transform: uppercase; }

  /* ── Scroll area ── */
  .view {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px;
    display: none;
  }
  .view.active { display: block; }

  /* ── Cards ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
    margin-top: 4px;
  }

  /* ── Dashboard ── */
  .greeting {
    font-family: var(--font-display);
    font-size: 28px;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 4px;
  }

  .greeting span { color: var(--amber); }

  .sub-greeting {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 20px;
    letter-spacing: 0.3px;
  }

  .progress-ring-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  .progress-ring-container {
    position: relative;
    width: 100px;
    height: 100px;
  }

  .progress-ring-container svg {
    transform: rotate(-90deg);
  }

  .progress-ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .progress-pct {
    font-size: 22px;
    font-weight: 500;
    color: var(--amber);
  }

  .progress-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }

  .stat-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 10px;
    text-align: center;
  }

  .stat-val {
    font-size: 20px;
    font-weight: 500;
    color: var(--amber);
    display: block;
  }

  .stat-lbl {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-top: 2px;
    display: block;
  }

  /* ── Badges ── */
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .task-item:last-child { border-bottom: none; }

  .task-check {
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all 0.15s;
  }

  .task-item.done .task-check {
    background: var(--amber);
    border-color: var(--amber);
  }

  .task-item.done .task-check::after {
    content: '✓';
    color: var(--bg);
    font-size: 11px;
    font-weight: 700;
  }

  .task-text {
    font-size: 14px;
    line-height: 1.4;
    color: var(--text);
    flex: 1;
  }

  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .task-goal-link {
    font-size: 10px;
    color: var(--amber-dim);
    letter-spacing: 0.3px;
    margin-top: 2px;
  }

  /* ── Add input ── */
  .add-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    flex: 1;
    transition: border 0.15s;
  }
  .input:focus { border-color: var(--amber-dim); }
  .input::placeholder { color: var(--text-muted); }

  select.input option {
    background: var(--bg3);
    color: var(--text);
  }

  .btn {
    background: var(--amber);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 10px 14px;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.95); opacity: 0.85; }
  .btn.secondary {
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn.danger {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
  }
  .btn.full { width: 100%; justify-content: center; margin-top: 8px; display: flex; }

  /* ── Habits ── */
  .habit-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .habit-item:last-child { border-bottom: none; }

  .habit-dot {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.15s;
    border: 2px solid var(--border);
    background: var(--bg3);
  }
  .habit-dot.done {
    border-color: var(--amber);
    background: var(--amber-glow);
    box-shadow: 0 0 16px var(--amber-glow);
  }
  .habit-dot:active { transform: scale(0.9); }

  .habit-info { flex: 1; min-width: 0; }
  .habit-name { font-size: 14px; color: var(--text); }
  .habit-streak { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .streak-fire { color: var(--amber); }

  .habit-week {
    display: flex;
    gap: 3px;
  }

  .habit-day-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
  }
  .habit-day-dot.done { background: var(--amber); }
  .habit-day-dot.today { outline: 1px solid var(--amber-dim); outline-offset: 1px; }

  /* ── Goals ── */
  .goal-item {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .goal-item:last-child { border-bottom: none; }

  .goal-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }

  .goal-name {
    font-size: 14px;
    color: var(--text);
    flex: 1;
    padding-right: 8px;
  }

  .goal-cat {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--amber-dim);
    padding: 2px 6px;
    border: 1px solid var(--amber-dim);
    border-radius: 4px;
    flex-shrink: 0;
  }

  .goal-bar-wrap {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .goal-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--amber-dim), var(--amber));
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  .goal-meta {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-dim);
  }

  .goal-deadline {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .days-left { color: var(--amber); }

  /* ── Calendar connect ── */
  .cal-connect {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    margin-bottom: 12px;
  }

  .cal-icon { font-size: 36px; margin-bottom: 10px; }
  .cal-connect h3 { font-family: var(--font-display); font-size: 18px; margin-bottom: 6px; }
  .cal-connect p { font-size: 12px; color: var(--text-dim); line-height: 1.5; margin-bottom: 16px; }

  /* ── Settings ── */
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .settings-label { font-size: 13px; color: var(--text); }
  .settings-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .toggle {
    width: 44px;
    height: 26px;
    background: var(--border);
    border-radius: 13px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--amber); }
  .toggle::after {
    content: '';
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 3px;
    left: 3px;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(18px); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    z-index: 100;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(var(--safe-bottom) + 20px);
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .modal-title {
    font-family: var(--font-display);
    font-size: 20px;
    margin-bottom: 16px;
    color: var(--amber);
  }

  .form-group {
    margin-bottom: 12px;
  }

  .form-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: block;
  }

  .input.full { width: 100%; }

  /* ── Animations ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card, .habit-item, .goal-item { animation: fadeIn 0.25s ease both; }

  .empty-state {
    text-align: center;
    padding: 30px 20px;
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.6;
  }
  .empty-state span { font-size: 28px; display: block; margin-bottom: 8px; }

  .amber { color: var(--amber); }

  /* action buttons */
  .delete-btn {
    font-size: 16px;
    color: var(--red);
    cursor: pointer;
    padding: 6px 8px;
    transition: all 0.15s;
    flex-shrink: 0;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: 7px;
    line-height: 1;
    min-width: 32px;
    text-align: center;
  }
  .delete-btn:active { background: rgba(248,113,113,0.3); transform: scale(0.93); }

  .edit-btn {
    font-size: 14px;
    color: var(--blue);
    cursor: pointer;
    padding: 6px 8px;
    transition: all 0.15s;
    flex-shrink: 0;
    background: rgba(96,165,250,0.1);
    border: 1px solid rgba(96,165,250,0.25);
    border-radius: 7px;
    line-height: 1;
    min-width: 32px;
    text-align: center;
    font-family: var(--font-mono);
  }
  .edit-btn:active { background: rgba(96,165,250,0.3); transform: scale(0.93); }

  .cal-btn {
    font-size: 14px;
    cursor: pointer;
    padding: 6px 8px;
    transition: all 0.15s;
    flex-shrink: 0;
    background: rgba(96,165,250,0.08);
    border: 1px solid rgba(96,165,250,0.2);
    border-radius: 7px;
    line-height: 1;
    min-width: 32px;
    text-align: center;
  }
  .cal-btn:active { transform: scale(0.93); opacity: 0.7; }

  .item-actions {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
    margin-left: 4px;
  }

  .note-btn {
    font-size: 13px;
    cursor: pointer;
    padding: 6px 8px;
    transition: all 0.15s;
    flex-shrink: 0;
    background: rgba(232,160,69,0.1);
    border: 1px solid rgba(232,160,69,0.25);
    border-radius: 7px;
    line-height: 1;
    min-width: 32px;
    text-align: center;
    color: var(--amber);
    font-family: var(--font-mono);
  }
  .note-btn:active { background: rgba(232,160,69,0.25); transform: scale(0.93); }

  /* Note popup */
  .note-popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  .note-popup-overlay.open { display: flex; }

  .note-popup {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 480px;
    max-height: 70vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: fadeIn 0.2s ease;
  }

  .note-popup-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .note-popup-title {
    font-family: var(--font-display);
    font-size: 16px;
    color: var(--amber);
    flex: 1;
    padding-right: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .note-popup-close {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .note-popup-close:active { background: var(--border); }

  .note-popup-body {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 18px;
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .badge.green { background: rgba(74,222,128,0.15); color: var(--green); }
  .badge.dim { background: var(--bg3); color: var(--text-dim); }

  /* Day picker */
  .day-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .day-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--bg3); color: var(--text-dim);
    font-size: 11px; font-family: var(--font-mono);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .day-btn.selected { background: var(--amber); border-color: var(--amber); color: var(--bg); font-weight: 600; }

  /* Recurrence label */
  .recur-badge {
    font-size: 9px; letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--amber-dim); margin-top: 2px;
  }

  /* Habit not-due-today dimming */
  .habit-item.not-due { opacity: 0.4; }

  /* Task deadline */
  .task-deadline { font-size: 10px; margin-top: 2px; }
  .task-deadline.overdue { color: var(--red); }
  .task-deadline.due-soon { color: var(--amber); }
  .task-deadline.fine { color: var(--text-dim); }
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <div class="header">
    <div>
      <div class="header-title">Focus</div>
      <div class="header-date" id="headerDate"></div>
    </div>
    <div class="header-right">
      <div class="icon-btn" onclick="openAddModal('task')" title="Add">＋</div>
    </div>
  </div>

  <!-- Views -->
  <div class="view active" id="view-dashboard"></div>
  <div class="view" id="view-habits"></div>
  <div class="view" id="view-goals"></div>
  <div class="view" id="view-settings"></div>

  <!-- Nav -->
  <nav class="nav">
    <button class="nav-btn active" onclick="showView('dashboard',this)">
      <span class="nav-icon">◈</span><span class="nav-label">Today</span>
    </button>
    <button class="nav-btn" onclick="showView('habits',this)">
      <span class="nav-icon">⬡</span><span class="nav-label">Habits</span>
    </button>
    <button class="nav-btn" onclick="showView('goals',this)">
      <span class="nav-icon">◎</span><span class="nav-label">Goals</span>
    </button>
    <button class="nav-btn" onclick="showView('settings',this)">
      <span class="nav-icon">⊕</span><span class="nav-label">Setup</span>
    </button>
  </nav>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Add Item</div>

    <!-- Tabs -->
    <div style="display:flex;gap:6px;margin-bottom:16px;">
      <button class="btn" id="tab-task" onclick="switchModalTab('task')">Task</button>
      <button class="btn secondary" id="tab-habit" onclick="switchModalTab('habit')">Habit</button>
      <button class="btn secondary" id="tab-goal" onclick="switchModalTab('goal')">Goal</button>
    </div>

    <!-- Task form -->
    <div id="form-task">
      <div class="form-group">
        <label class="form-label">Task</label>
        <input class="input full" id="taskName" placeholder="What needs doing today?" maxlength="100">
      </div>
      <div class="form-group">
        <label class="form-label">Deadline (optional)</label>
        <input class="input full" type="date" id="taskDeadline">
      </div>
      <div class="form-group">
        <label class="form-label">Link to goal (optional)</label>
        <select class="input full" id="taskGoal">
          <option value="">— no goal —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <textarea class="input full" id="taskNotes" rows="3" placeholder="Any extra context…" style="resize:none;line-height:1.5"></textarea>
      </div>
      <button class="btn full" id="taskSaveBtn" onclick="saveTask()">Add Task</button>
    </div>

    <!-- Habit form -->
    <div id="form-habit" style="display:none">
      <div class="form-group">
        <label class="form-label">Habit name</label>
        <input class="input full" id="habitName" placeholder="e.g. Morning workout" maxlength="60">
      </div>
      <div class="form-group">
        <label class="form-label">Emoji icon</label>
        <input class="input full" id="habitEmoji" placeholder="🏋️" maxlength="2" value="⬡">
      </div>
      <div class="form-group">
        <label class="form-label">Schedule</label>
        <select class="input full" id="habitRecur" onchange="updateRecurUI()">
          <option value="daily">Every day</option>
          <option value="weekly">Weekly — specific days</option>
          <option value="monthly">Once a month</option>
        </select>
      </div>
      <!-- Weekly day picker -->
      <div id="weeklyPicker" style="display:none" class="form-group">
        <label class="form-label">Which days?</label>
        <div class="day-picker">
          <button type="button" class="day-btn" data-day="1" onclick="toggleDay(this)">Mo</button>
          <button type="button" class="day-btn" data-day="2" onclick="toggleDay(this)">Tu</button>
          <button type="button" class="day-btn" data-day="3" onclick="toggleDay(this)">We</button>
          <button type="button" class="day-btn" data-day="4" onclick="toggleDay(this)">Th</button>
          <button type="button" class="day-btn" data-day="5" onclick="toggleDay(this)">Fr</button>
          <button type="button" class="day-btn" data-day="6" onclick="toggleDay(this)">Sa</button>
          <button type="button" class="day-btn" data-day="0" onclick="toggleDay(this)">Su</button>
        </div>
      </div>
      <!-- Monthly day picker -->
      <div id="monthlyPicker" style="display:none" class="form-group">
        <label class="form-label">Day of month</label>
        <input class="input full" type="number" id="habitMonthDay" min="1" max="31" placeholder="e.g. 1 for the 1st" value="1">
      </div>
      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <textarea class="input full" id="habitNotes" rows="3" placeholder="Why this habit matters…" style="resize:none;line-height:1.5"></textarea>
      </div>
      <button class="btn full" id="habitSaveBtn" onclick="saveHabit()">Add Habit</button>
    </div>

    <!-- Goal form -->
    <div id="form-goal" style="display:none">
      <div class="form-group">
        <label class="form-label">Goal</label>
        <input class="input full" id="goalName" placeholder="e.g. Ship Project Ashlar v1" maxlength="80">
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="input full" id="goalCat">
          <option value="work">Work</option>
          <option value="health">Health</option>
          <option value="learning">Learning</option>
          <option value="personal">Personal</option>
          <option value="finance">Finance</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Target date</label>
        <input class="input full" type="date" id="goalDeadline">
      </div>
      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <textarea class="input full" id="goalNotes" rows="3" placeholder="Why this goal matters, how to get there…" style="resize:none;line-height:1.5"></textarea>
      </div>
      <button class="btn full" id="goalSaveBtn" onclick="saveGoal()">Add Goal</button>
    </div>
  </div>
</div>

<!-- Note Popup -->
<div class="note-popup-overlay" id="notePopup" onclick="closeNotePopup(event)">
  <div class="note-popup">
    <div class="note-popup-header">
      <div class="note-popup-title" id="notePopupTitle"></div>
      <button class="note-popup-close" onclick="document.getElementById('notePopup').classList.remove('open')">✕</button>
    </div>
    <div class="note-popup-body" id="notePopupBody"></div>
  </div>
</div>

<input type="file" id="importFileInput" accept=".csv" style="display:none" onchange="handleImportFile(this)">

<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const today = () => new Date().toISOString().slice(0,10);

function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

let tasks   = load('focus_tasks', []);
let habits  = load('focus_habits', []);
let goals   = load('focus_goals', []);
let editingId = null; // tracks which item is being edited, null = creating new

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════
function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  btn.classList.add('active');
  renderAll();
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function renderAll() {
  renderDashboard();
  renderHabits();
  renderGoals();
  renderSettings();
}

// ── DASHBOARD ──
function renderDashboard() {
  const d = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('headerDate').textContent = `${days[d.getDay()]} · ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;

  const todayTasks = tasks.filter(t => t.date === today());
  const done = todayTasks.filter(t => t.done).length;
  const total = todayTasks.length;
  const pct = total > 0 ? Math.round((done/total)*100) : 0;

  const h = d.getHours();
  const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';

  let html = `
    <div class="greeting">${greet},<br><span>JP.</span></div>
    <div class="sub-greeting">Here's where you stand today.</div>
  `;

  // Progress ring
  const r = 36, circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  html += `
    <div class="progress-ring-wrap">
      <div class="progress-ring-container">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="${r}" stroke="#1a1e28" stroke-width="8" fill="none"/>
          <circle cx="50" cy="50" r="${r}" stroke="${pct===100?'#4ade80':'#e8a045'}" stroke-width="8" fill="none"
            stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
            stroke-linecap="round" style="transition:stroke-dashoffset 0.6s ease"/>
        </svg>
        <div class="progress-ring-center">
          <div class="progress-pct">${pct}%</div>
          <div class="progress-label">Done</div>
        </div>
      </div>
    </div>
  `;

  // Stats
  const habitsToday = habits.filter(h => isHabitDueToday(h) && (h.log||[]).includes(today())).length;
  const habitsDueToday = habits.filter(h => isHabitDueToday(h)).length;
  const activeGoals = goals.filter(g => !g.done).length;
  html += `
    <div class="stat-row">
      <div class="stat-box"><span class="stat-val">${done}/${total}</span><span class="stat-lbl">Tasks</span></div>
      <div class="stat-box"><span class="stat-val">${habitsToday}/${habitsDueToday}</span><span class="stat-lbl">Habits</span></div>
      <div class="stat-box"><span class="stat-val">${activeGoals}</span><span class="stat-lbl">Goals</span></div>
    </div>
  `;

  // Today's tasks
  html += `<div class="card">
    <div class="card-header">
      <div class="card-title">Today's Tasks</div>
    </div>`;

  if (todayTasks.length === 0) {
    html += `<div class="empty-state"><span>✦</span>No tasks yet.<br>Tap + to add something.</div>`;
  } else {
    todayTasks.forEach((t, i) => {
      const goalName = t.goalId ? (goals.find(g=>g.id===t.goalId)||{}).name : '';
      const dlHtml = deadlineHtml(t.deadline);
      html += `<div class="task-item ${t.done?'done':''}" onclick="toggleTask('${t.id}')">
        <div class="task-check"></div>
        <div style="flex:1">
          <div class="task-text">${escHtml(t.text)}</div>
          ${dlHtml}
          ${goalName?`<div class="task-goal-link">↗ ${escHtml(goalName)}</div>`:''}
        </div>
        <div class="item-actions">
          <button class="cal-btn" title="Add to iPhone Calendar" onclick="event.stopPropagation();addTaskToCalendar('${t.id}')">📅</button>
          ${t.notes ? `<button class="note-btn" title="View note" onclick="event.stopPropagation();openNotePopup(${JSON.stringify(escHtml(t.text))},${JSON.stringify(t.notes)})">✎📋</button>` : ''}
          <button class="edit-btn" title="Edit" onclick="event.stopPropagation();openEditModal('task','${t.id}')">✎</button>
          <button class="delete-btn" title="Delete" onclick="event.stopPropagation();confirmDelete('task','${t.id}')">✕</button>
        </div>
      </div>`;
    });
  }

  html += `</div>`;

  document.getElementById('view-dashboard').innerHTML = html;
}

// ── HABITS ──
function renderHabits() {
  let html = `<div class="card-title" style="margin-bottom:14px">Habit Tracker</div>`;

  if (habits.length === 0) {
    html += `<div class="empty-state"><span>⬡</span>No habits yet.<br>Build consistency one day at a time.</div>`;
  } else {
    // Split: due today first, then not due
    const due = habits.filter(h => isHabitDueToday(h));
    const notDue = habits.filter(h => !isHabitDueToday(h));

    const renderHabitItem = (h, dimmed) => {
      const log = h.log || [];
      const doneTodayFlag = log.includes(today());
      const streak = calcStreak(log, h);
      const recurLabel = recurDescription(h);

      // Last 7 days dots — grey out days when habit wasn't scheduled
      const last7 = [];
      for (let i=6; i>=0; i--) {
        const d = new Date(); d.setDate(d.getDate()-i);
        const ds = d.toISOString().slice(0,10);
        const wasDue = isHabitDueOnDate(h, d);
        last7.push({ ds, done: log.includes(ds), isToday: i===0, wasDue });
      }
      const dotsHtml = last7.map(x =>
        `<div class="habit-day-dot ${x.done?'done':''} ${x.isToday?'today':''}" style="${!x.wasDue?'opacity:0.2':''}"></div>`
      ).join('');

      return `<div class="habit-item ${dimmed?'not-due':''}">
        <div class="habit-dot ${doneTodayFlag?'done':''}" onclick="toggleHabit('${h.id}')">${h.emoji||'⬡'}</div>
        <div class="habit-info">
          <div class="habit-name">${escHtml(h.name)}</div>
          <div class="recur-badge">${recurLabel}</div>
          ${h.notes ? `<div style="font-size:11px;color:var(--text-dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px">${escHtml(h.notes)}</div>` : ''}
          <div class="habit-streak">
            ${streak>0?`<span class="streak-fire">🔥</span> ${streak} streak — `:''}
            <span style="display:inline-flex;gap:3px;vertical-align:middle">${dotsHtml}</span>
          </div>
        </div>
        <div class="item-actions">
          ${h.notes ? `<button class="note-btn" title="View note" onclick="openNotePopup(${JSON.stringify(escHtml(h.name))},${JSON.stringify(h.notes)})">📋</button>` : ''}
          <button class="edit-btn" onclick="openEditModal('habit','${h.id}')">✎</button>
          <button class="delete-btn" onclick="confirmDelete('habit','${h.id}')">✕</button>
        </div>
      </div>`;
    };

    if (due.length > 0) {
      html += `<div class="section-label">Due today</div><div class="card">`;
      due.forEach(h => { html += renderHabitItem(h, false); });
      html += `</div>`;
    }

    if (notDue.length > 0) {
      html += `<div class="section-label" style="margin-top:14px">Not scheduled today</div><div class="card">`;
      notDue.forEach(h => { html += renderHabitItem(h, true); });
      html += `</div>`;
    }
  }

  document.getElementById('view-habits').innerHTML = html;
}

function calcStreak(log, habit) {
  if (!log || log.length === 0) return 0;
  let streak = 0;
  const d = new Date();
  // Walk back day by day; only count scheduled days
  for (let i = 0; i < 365; i++) {
    const ds = d.toISOString().slice(0,10);
    const scheduled = !habit || isHabitDueOnDate(habit, new Date(d));
    if (!scheduled) { d.setDate(d.getDate()-1); continue; }
    if (log.includes(ds)) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

// Is this habit scheduled for today?
function isHabitDueToday(h) {
  return isHabitDueOnDate(h, new Date());
}

function isHabitDueOnDate(h, date) {
  const s = h.schedule;
  if (!s || s.type === 'daily') return true;
  if (s.type === 'weekly') {
    return (s.days || []).includes(date.getDay());
  }
  if (s.type === 'monthly') {
    return date.getDate() === (s.dayOfMonth || 1);
  }
  return true;
}

function recurDescription(h) {
  const s = h.schedule;
  if (!s || s.type === 'daily') return 'Every day';
  if (s.type === 'weekly') {
    const names = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    return 'Weekly · ' + (s.days||[]).sort().map(d=>names[d]).join(', ');
  }
  if (s.type === 'monthly') {
    const n = s.dayOfMonth || 1;
    const suffix = n===1?'st':n===2?'nd':n===3?'rd':'th';
    return `Monthly · ${n}${suffix}`;
  }
  return '';
}

function deadlineHtml(deadline) {
  if (!deadline) return '';
  const diff = Math.ceil((new Date(deadline) - new Date()) / 86400000);
  if (diff < 0) return `<div class="task-deadline overdue">⚠ Overdue by ${Math.abs(diff)}d</div>`;
  if (diff === 0) return `<div class="task-deadline due-soon">Due today</div>`;
  if (diff <= 3) return `<div class="task-deadline due-soon">Due in ${diff}d</div>`;
  return `<div class="task-deadline fine">Due ${deadline}</div>`;
}

// ── GOALS ──
function renderGoals() {
  let html = `<div class="card-title" style="margin-bottom:14px">Long-term Goals</div>`;

  const active = goals.filter(g => !g.done);
  const done = goals.filter(g => g.done);

  if (goals.length === 0) {
    html += `<div class="empty-state"><span>◎</span>No goals yet.<br>Define what you're building toward.</div>`;
  }

  if (active.length > 0) {
    html += `<div class="card">`;
    active.forEach(g => {
      const daysLeft = g.deadline ? Math.ceil((new Date(g.deadline) - new Date()) / 86400000) : null;
      const progress = g.progress || 0;
      const tasksLinked = tasks.filter(t => t.goalId === g.id).length;
      const tasksDone = tasks.filter(t => t.goalId === g.id && t.done).length;
      html += `<div class="goal-item">
        <div class="goal-top">
          <div class="goal-name">${escHtml(g.name)}</div>
          <div class="goal-cat">${g.category||'goal'}</div>
        </div>
        <div class="goal-bar-wrap"><div class="goal-bar" style="width:${progress}%"></div></div>
        <div class="goal-meta">
          <span>${progress}% complete · ${tasksDone}/${tasksLinked} tasks</span>
          ${daysLeft!==null?`<span class="days-left">${daysLeft>0?daysLeft+'d left':'Overdue'}</span>`:''}
        </div>
        <div style="display:flex;gap:6px;margin-top:10px;align-items:center">
          <input type="range" min="0" max="100" value="${progress}" 
            style="flex:1;accent-color:var(--amber)" 
            oninput="updateGoalProgress('${g.id}',this.value)" onchange="saveGoalProgress('${g.id}',this.value)">
          <button class="btn secondary" style="padding:4px 10px;font-size:11px" onclick="toggleGoalDone('${g.id}')">✓</button>
          ${g.notes ? `<button class="note-btn" onclick="openNotePopup(${JSON.stringify(escHtml(g.name))},${JSON.stringify(g.notes)})">📋</button>` : ''}
          <button class="edit-btn" onclick="openEditModal('goal','${g.id}')">✎</button>
          <button class="delete-btn" onclick="confirmDelete('goal','${g.id}')">✕</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  if (done.length > 0) {
    html += `<div class="section-label" style="margin-top:16px">Completed</div><div class="card">`;
    done.forEach(g => {
      html += `<div class="goal-item" style="opacity:0.5">
        <div class="goal-top">
          <div class="goal-name" style="text-decoration:line-through">${escHtml(g.name)}</div>
          <span class="badge green">Done</span>
        </div>
        <div class="item-actions" style="margin-top:8px">
          <button class="delete-btn" onclick="confirmDelete('goal','${g.id}')">✕</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  document.getElementById('view-goals').innerHTML = html;
}

// ── SETTINGS ──
function renderSettings() {
  let html = `
    <div class="card-title" style="margin-bottom:14px">Setup & Settings</div>

    <div class="card">
      <div class="settings-row">
        <div>
          <div class="settings-label">Install as App</div>
          <div class="settings-sub">Open this page in Safari → Share → Add to Home Screen</div>
        </div>
        <span style="font-size:20px">📲</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title" style="margin-bottom:12px">Data</div>
      <div class="settings-row" style="border:none">
        <div><div class="settings-label">Tasks today</div></div>
        <div style="color:var(--amber)">${tasks.filter(t=>t.date===today()).length}</div>
      </div>
      <div class="settings-row" style="border:none">
        <div><div class="settings-label">Total habits</div></div>
        <div style="color:var(--amber)">${habits.length}</div>
      </div>
      <div class="settings-row" style="border:none">
        <div><div class="settings-label">Active goals</div></div>
        <div style="color:var(--amber)">${goals.filter(g=>!g.done).length}</div>
      </div>
      <button class="btn secondary full" style="margin-top:8px" onclick="document.getElementById('importFileInput').click()">⬆ Import CSV</button>
      <button class="btn full" style="margin-top:8px" onclick="exportAllData()">⬇ Export All Data as CSV</button>
      <button class="btn danger full" style="margin-top:8px" onclick="clearAllData()">Clear All Data</button>
    </div>
  `;

  document.getElementById('view-settings').innerHTML = html;
}

// ══════════════════════════════════════════
//  CONFIRM DELETE
// ══════════════════════════════════════════
function confirmDelete(type, id) {
  const labels = { task: 'task', habit: 'habit', goal: 'goal' };
  let name = '';
  if (type === 'task')  name = (tasks.find(x=>x.id===id)||{}).text || 'this task';
  if (type === 'habit') name = (habits.find(x=>x.id===id)||{}).name || 'this habit';
  if (type === 'goal')  name = (goals.find(x=>x.id===id)||{}).name || 'this goal';

  if (!confirm(`Delete ${labels[type]}?\n\n"${name}"\n\nThis cannot be undone.`)) return;

  if (type === 'task')  deleteTask(id);
  if (type === 'habit') deleteHabit(id);
  if (type === 'goal')  deleteGoal(id);
}

// ══════════════════════════════════════════
//  ACTIONS — TASKS
// ══════════════════════════════════════════
function saveTask() {
  const name = document.getElementById('taskName').value.trim();
  if (!name) return;
  const goalId  = document.getElementById('taskGoal').value;
  const deadline = document.getElementById('taskDeadline').value || null;
  const notes   = document.getElementById('taskNotes').value.trim() || null;

  if (editingId) {
    const t = tasks.find(x => x.id === editingId);
    if (t) { t.text = name; t.deadline = deadline; t.goalId = goalId||null; t.notes = notes; }
  } else {
    tasks.push({ id: uid(), text: name, date: today(), done: false, goalId: goalId||null, deadline, notes });
  }
  save('focus_tasks', tasks);
  closeAddModal();
  renderAll();
}

function toggleTask(id) {
  const t = tasks.find(x=>x.id===id);
  if (t) { t.done = !t.done; save('focus_tasks', tasks); renderAll(); }
}

function deleteTask(id) {
  tasks = tasks.filter(t=>t.id!==id);
  save('focus_tasks', tasks);
  renderAll();
}

// ══════════════════════════════════════════
//  ACTIONS — HABITS
// ══════════════════════════════════════════
function saveHabit() {
  const name  = document.getElementById('habitName').value.trim();
  if (!name) return;
  const emoji = document.getElementById('habitEmoji').value.trim() || '⬡';
  const recur = document.getElementById('habitRecur').value;
  const notes = document.getElementById('habitNotes').value.trim() || null;

  let schedule = { type: recur };
  if (recur === 'weekly') {
    const days = [...document.querySelectorAll('.day-btn.selected')].map(b => parseInt(b.dataset.day));
    if (days.length === 0) { alert('Please select at least one day.'); return; }
    schedule.days = days;
  } else if (recur === 'monthly') {
    schedule.dayOfMonth = parseInt(document.getElementById('habitMonthDay').value) || 1;
  }

  if (editingId) {
    const h = habits.find(x => x.id === editingId);
    if (h) { h.name = name; h.emoji = emoji; h.schedule = schedule; h.notes = notes; }
  } else {
    habits.push({ id: uid(), name, emoji, log: [], schedule, notes });
  }
  save('focus_habits', habits);
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('selected'));
  closeAddModal();
  renderAll();
}

function toggleHabit(id) {
  const h = habits.find(x=>x.id===id);
  if (!h) return;
  h.log = h.log || [];
  if (h.log.includes(today())) {
    h.log = h.log.filter(d=>d!==today());
  } else {
    h.log.push(today());
  }
  save('focus_habits', habits);
  renderAll();
}

function deleteHabit(id) {
  habits = habits.filter(h=>h.id!==id);
  save('focus_habits', habits);
  renderAll();
}

// ══════════════════════════════════════════
//  ACTIONS — GOALS
// ══════════════════════════════════════════
function saveGoal() {
  const name  = document.getElementById('goalName').value.trim();
  if (!name) return;
  const notes = document.getElementById('goalNotes').value.trim() || null;

  if (editingId) {
    const g = goals.find(x => x.id === editingId);
    if (g) {
      g.name     = name;
      g.category = document.getElementById('goalCat').value;
      g.deadline = document.getElementById('goalDeadline').value || null;
      g.notes    = notes;
    }
  } else {
    goals.push({
      id: uid(), name,
      category: document.getElementById('goalCat').value,
      deadline: document.getElementById('goalDeadline').value || null,
      progress: 0, done: false, notes
    });
  }
  save('focus_goals', goals);
  closeAddModal();
  renderAll();
}

function updateGoalProgress(id, val) {
  const g = goals.find(x=>x.id===id);
  if (g) { g.progress = parseInt(val); renderGoals(); }
}

function saveGoalProgress(id, val) {
  const g = goals.find(x=>x.id===id);
  if (g) { g.progress = parseInt(val); save('focus_goals', goals); }
}

function toggleGoalDone(id) {
  const g = goals.find(x=>x.id===id);
  if (g) { g.done = true; g.progress = 100; save('focus_goals', goals); renderAll(); }
}

function deleteGoal(id) {
  goals = goals.filter(g=>g.id!==id);
  save('focus_goals', goals);
  renderAll();
}

// ── Add task to iPhone Calendar as .ics download ──
function addTaskToCalendar(taskId) {
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;

  const now = new Date();
  // Schedule task as 1-hour block starting next whole hour
  const start = new Date(now);
  start.setMinutes(0, 0, 0);
  start.setHours(start.getHours() + 1);
  const end = new Date(start); end.setHours(end.getHours() + 1);

  const fmt = d => d.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  const uid_ = `focus-${taskId}@jp-focus-app`;

  const goalName = t.goalId ? (goals.find(g=>g.id===t.goalId)||{}).name || '' : '';
  const desc = goalName ? `Goal: ${goalName}` : 'Added from Focus app';

  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Focus PWA//EN',
    'BEGIN:VEVENT',
    `UID:${uid_}`,
    `DTSTAMP:${fmt(now)}`,
    `DTSTART:${fmt(start)}`,
    `DTEND:${fmt(end)}`,
    `SUMMARY:${t.text}`,
    `DESCRIPTION:${desc}`,
    'END:VEVENT',
    'END:VCALENDAR'
  ].join('\r\n');

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${t.text.slice(0,30).replace(/[^a-z0-9]/gi,'_')}.ics`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ══════════════════════════════════════════
//  MODALS
// ══════════════════════════════════════════
function openAddModal(tab) {
  editingId = null;
  _resetModal();
  switchModalTab(tab || 'task');
  document.getElementById('modalTitle').textContent = 'Add Item';
  document.getElementById('taskSaveBtn').textContent  = 'Add Task';
  document.getElementById('habitSaveBtn').textContent = 'Add Habit';
  document.getElementById('goalSaveBtn').textContent  = 'Add Goal';
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('taskName').focus(), 300);
}

function openEditModal(type, id) {
  editingId = id;
  _resetModal();
  switchModalTab(type);
  document.getElementById('modalTitle').textContent = 'Edit ' + type.charAt(0).toUpperCase() + type.slice(1);
  document.getElementById('taskSaveBtn').textContent  = 'Save Task';
  document.getElementById('habitSaveBtn').textContent = 'Save Habit';
  document.getElementById('goalSaveBtn').textContent  = 'Save Goal';

  if (type === 'task') {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    // Populate goal dropdown first
    const sel = document.getElementById('taskGoal');
    sel.innerHTML = '<option value="">— no goal —</option>';
    goals.filter(g=>!g.done).forEach(g => {
      sel.innerHTML += `<option value="${g.id}" ${g.id===t.goalId?'selected':''}>${escHtml(g.name)}</option>`;
    });
    document.getElementById('taskName').value     = t.text;
    document.getElementById('taskDeadline').value = t.deadline || '';
    document.getElementById('taskNotes').value    = t.notes || '';
  }

  if (type === 'habit') {
    const h = habits.find(x => x.id === id);
    if (!h) return;
    document.getElementById('habitName').value    = h.name;
    document.getElementById('habitEmoji').value   = h.emoji || '⬡';
    document.getElementById('habitNotes').value   = h.notes || '';
    const s = h.schedule || { type: 'daily' };
    document.getElementById('habitRecur').value   = s.type;
    updateRecurUI();
    if (s.type === 'weekly' && s.days) {
      document.querySelectorAll('.day-btn').forEach(b => {
        if (s.days.includes(parseInt(b.dataset.day))) b.classList.add('selected');
      });
    }
    if (s.type === 'monthly') {
      document.getElementById('habitMonthDay').value = s.dayOfMonth || 1;
    }
  }

  if (type === 'goal') {
    const g = goals.find(x => x.id === id);
    if (!g) return;
    document.getElementById('goalName').value     = g.name;
    document.getElementById('goalCat').value      = g.category || 'work';
    document.getElementById('goalDeadline').value = g.deadline || '';
    document.getElementById('goalNotes').value    = g.notes || '';
  }

  document.getElementById('addModal').classList.add('open');
}

function _resetModal() {
  ['taskName','taskNotes','habitName','habitNotes','goalName','goalNotes'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('taskDeadline').value = '';
  document.getElementById('goalDeadline').value = '';
  document.getElementById('habitEmoji').value = '⬡';
  document.getElementById('habitRecur').value = 'daily';
  document.getElementById('habitMonthDay').value = '1';
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('selected'));
  updateRecurUI();
  // Reset goal dropdown
  const sel = document.getElementById('taskGoal');
  sel.innerHTML = '<option value="">— no goal —</option>';
  goals.filter(g=>!g.done).forEach(g => {
    sel.innerHTML += `<option value="${g.id}">${escHtml(g.name)}</option>`;
  });
}

function closeAddModal() {
  editingId = null;
  document.getElementById('addModal').classList.remove('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('addModal')) closeAddModal();
}

function closeNotePopup(e) {
  if (e.target === document.getElementById('notePopup'))
    document.getElementById('notePopup').classList.remove('open');
}

function openNotePopup(title, note) {
  document.getElementById('notePopupTitle').textContent = title;
  document.getElementById('notePopupBody').textContent  = note;
  document.getElementById('notePopup').classList.add('open');
}

function toggleDay(btn) {
  btn.classList.toggle('selected');
}

function updateRecurUI() {
  const val = document.getElementById('habitRecur').value;
  document.getElementById('weeklyPicker').style.display  = val === 'weekly'  ? 'block' : 'none';
  document.getElementById('monthlyPicker').style.display = val === 'monthly' ? 'block' : 'none';
}

function switchModalTab(tab) {
  ['task','habit','goal'].forEach(t => {
    document.getElementById('form-'+t).style.display = t===tab ? 'block' : 'none';
    document.getElementById('tab-'+t).className = 'btn ' + (t===tab?'':'secondary');
  });
}

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function clearAllData() {
  if (!confirm('Delete all tasks, habits, and goals? This cannot be undone.')) return;
  tasks = []; habits = []; goals = [];
  save('focus_tasks', tasks);
  save('focus_habits', habits);
  save('focus_goals', goals);
  renderAll();
}

// ══════════════════════════════════════════
//  EXPORT
// ══════════════════════════════════════════
function csvCell(val) {
  const s = String(val ?? '');
  return s.includes(',') || s.includes('"') || s.includes('\n')
    ? `"${s.replace(/"/g, '""')}"` : s;
}

function csvRow(cells) { return cells.map(csvCell).join(','); }

function downloadCsv(filename, rows) {
  const blob = new Blob([rows.join('\r\n')], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportAllData() {
  const now = new Date().toISOString().slice(0,10);

  // ── TASKS ──
  const taskRows = [csvRow(['id','date','text','done','deadline','linked_goal','notes'])];
  tasks.forEach(t => {
    const goalName = t.goalId ? (goals.find(g=>g.id===t.goalId)||{}).name||'' : '';
    taskRows.push(csvRow([t.id, t.date, t.text, t.done?'yes':'no', t.deadline||'', goalName, t.notes||'']));
  });

  // ── HABITS ──
  const habitRows = [csvRow(['id','name','emoji','schedule','streak','total_days_logged','log_dates','notes'])];
  habits.forEach(h => {
    const log = h.log || [];
    habitRows.push(csvRow([h.id, h.name, h.emoji||'', recurDescription(h), calcStreak(log,h), log.length, log.sort().join(';'), h.notes||'']));
  });

  // ── GOALS ──
  const goalRows = [csvRow(['id','name','category','deadline','progress_pct','done','linked_tasks_total','linked_tasks_done','notes'])];
  goals.forEach(g => {
    const linked = tasks.filter(t=>t.goalId===g.id);
    goalRows.push(csvRow([g.id, g.name, g.category||'', g.deadline||'', g.progress||0, g.done?'yes':'no', linked.length, linked.filter(t=>t.done).length, g.notes||'']));
  });

  // ── COMBINED: three sheets in one file, separated by blank lines ──
  const allRows = [
    `# Focus Export — ${now}`,
    '',
    '## TASKS',
    ...taskRows,
    '',
    '## HABITS',
    ...habitRows,
    '',
    '## GOALS',
    ...goalRows
  ];

  downloadCsv(`focus-export-${now}.csv`, allRows);
}

// ══════════════════════════════════════════
//  IMPORT
// ══════════════════════════════════════════
function handleImportFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const result = importCsv(e.target.result);
      const msg = `Import complete:\n• ${result.tasks} tasks\n• ${result.habits} habits\n• ${result.goals} goals\n\nDuplicates (same ID) were skipped.`;
      alert(msg);
      renderAll();
    } catch (err) {
      alert('Import failed. Make sure this is a Focus export CSV.\n\n' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = ''; // reset so same file can be re-imported
}

function importCsv(text) {
  // Normalise line endings
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');

  // Split into sections by ## headers
  const sections = {};
  let currentSection = null;
  let buffer = [];

  for (const line of lines) {
    if (line.startsWith('## ')) {
      if (currentSection) sections[currentSection] = buffer;
      currentSection = line.slice(3).trim(); // e.g. "TASKS"
      buffer = [];
    } else if (currentSection) {
      buffer.push(line);
    }
  }
  if (currentSection) sections[currentSection] = buffer;

  let addedTasks = 0, addedHabits = 0, addedGoals = 0;
  const existingTaskIds  = new Set(tasks.map(t => t.id));
  const existingHabitIds = new Set(habits.map(h => h.id));
  const existingGoalIds  = new Set(goals.map(g => g.id));

  // ── Parse goals first so we can resolve goal names → IDs for tasks ──
  if (sections['GOALS']) {
    const rows = parseCsvSection(sections['GOALS']);
    for (const r of rows) {
      if (!r.name) continue;
      if (existingGoalIds.has(r.id)) continue;
      goals.push({
        id:       r.id || uid(),
        name:     r.name,
        category: r.category || 'personal',
        deadline: r.deadline || null,
        progress: parseInt(r.progress_pct) || 0,
        done:     r.done === 'yes',
        notes:    r.notes || null
      });
      existingGoalIds.add(r.id);
      addedGoals++;
    }
    save('focus_goals', goals);
  }

  // ── Tasks ──
  if (sections['TASKS']) {
    const rows = parseCsvSection(sections['TASKS']);
    for (const r of rows) {
      if (!r.text) continue;
      if (existingTaskIds.has(r.id)) continue;
      // Resolve linked_goal name → id
      let goalId = null;
      if (r.linked_goal) {
        const match = goals.find(g => g.name === r.linked_goal);
        if (match) goalId = match.id;
      }
      tasks.push({
        id:       r.id || uid(),
        text:     r.text,
        date:     r.date || today(),
        done:     r.done === 'yes',
        deadline: r.deadline || null,
        goalId:   goalId,
        notes:    r.notes || null
      });
      existingTaskIds.add(r.id);
      addedTasks++;
    }
    save('focus_tasks', tasks);
  }

  // ── Habits ──
  if (sections['HABITS']) {
    const rows = parseCsvSection(sections['HABITS']);
    for (const r of rows) {
      if (!r.name) continue;
      if (existingHabitIds.has(r.id)) continue;
      const log = r.log_dates ? r.log_dates.split(';').filter(Boolean) : [];
      habits.push({
        id:       r.id || uid(),
        name:     r.name,
        emoji:    r.emoji || '⬡',
        log,
        schedule: parseScheduleString(r.schedule),
        notes:    r.notes || null
      });
      existingHabitIds.add(r.id);
      addedHabits++;
    }
    save('focus_habits', habits);
  }

  return { tasks: addedTasks, habits: addedHabits, goals: addedGoals };
}

// Parses a section's lines (skips blank, uses first non-blank as header)
function parseCsvSection(lines) {
  const nonBlank = lines.filter(l => l.trim() !== '');
  if (nonBlank.length < 2) return [];
  const headers = parseCsvLine(nonBlank[0]);
  return nonBlank.slice(1).map(line => {
    const vals = parseCsvLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = vals[i] ?? ''; });
    return obj;
  });
}

// Proper RFC 4180 CSV line parser — handles quoted fields with commas/newlines
function parseCsvLine(line) {
  const result = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { cur += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { result.push(cur); cur = ''; }
      else { cur += ch; }
    }
  }
  result.push(cur);
  return result;
}

// Reconstruct schedule object from the human-readable description string
function parseScheduleString(str) {
  if (!str || str === 'Every day') return { type: 'daily' };
  if (str.startsWith('Weekly')) {
    const dayMap = { Su:0, Mo:1, Tu:2, We:3, Th:4, Fr:5, Sa:6 };
    const part = str.replace('Weekly · ', '');
    const days = part.split(',').map(s => dayMap[s.trim()]).filter(d => d !== undefined);
    return { type: 'weekly', days: days.length ? days : [1] };
  }
  if (str.startsWith('Monthly')) {
    const match = str.match(/(\d+)/);
    return { type: 'monthly', dayOfMonth: match ? parseInt(match[1]) : 1 };
  }
  return { type: 'daily' };
}

//  SERVICE WORKER (PWA offline)
// ══════════════════════════════════════════
if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => clients.claim());
    self.addEventListener('fetch', e => {
      if (e.request.url.includes('allorigins') || e.request.url.includes('fonts.g')) return;
      e.respondWith(caches.open('focus-v1').then(c =>
        c.match(e.request).then(r => r || fetch(e.request).then(res => { c.put(e.request, res.clone()); return res; }))
      ).catch(() => caches.match(e.request)));
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
